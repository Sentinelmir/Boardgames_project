{% extends "base.html" %}
{% block title %}Genres · Boardgame World{% endblock %}

{% block content %}
<div class="d-flex align-items-end justify-content-between gap-2 mb-3">
  <div>
    <h1 class="h4 mb-1">Genres</h1>
    <div class="muted">Choose a genre to see matching games.</div>
  </div>
</div>

<div class="panel">
  <div class="d-flex flex-wrap gap-2">
    {% for genre in genres %}
      <a class="chip link-soft" href="{% url 'genre-detail' genre.value %}">
        {{ genre.label }} ({{ genre.count }})
      </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
