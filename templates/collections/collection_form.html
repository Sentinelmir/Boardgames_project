{% extends "base.html" %}

{% block title %}{{ page_title }} · Boardgame World{% endblock %}

{% block content %}
<div class="panel">
  <h1 class="h4 mb-3">{{ page_title }}</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% include "partials/_form_fields.html" with form=form %}
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
      <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
