{% extends "base.html" %}

{% block title %}Delete {{ collection.title }} · Boardgame World{% endblock %}

{% block content %}
<div class="panel">
  <h1 class="h4 mb-3">Delete collection</h1>
  <p class="muted">
    Are you sure you want to delete <strong>{{ collection.title }}</strong>?
  </p>

  <form method="post">
    {% csrf_token %}
    {% include "partials/_form_fields.html" with form=form %}
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
