{% extends "base.html" %}
{% block title %}Add review · Boardgame World{% endblock %}

{% block content %}
<div class="panel">
  <div class="d-flex align-items-end justify-content-between gap-2 mb-3">
    <div>
      <h1 class="h4 mb-1">Add review</h1>
      <div class="muted">Placeholder form (we’ll connect Django forms later).</div>
    </div>
    <a class="btn btn-sm btn-outline-secondary" href="#">Back</a>
  </div>

  <div class="soft-card p-3 mb-3">
    <div class="fw-bold">Brass: Birmingham</div>
    <div class="muted small">2–4 players · 60–120 min · Economic</div>
  </div>

  <form>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Your name</label>
        <input class="form-control" value="Alex">
      </div>
      <div class="col-md-6">
        <label class="form-label">Rating</label>
        <select class="form-select">
          <option>5</option>
          <option selected>4</option>
          <option>3</option>
          <option>2</option>
          <option>1</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Comment</label>
        <textarea class="form-control" rows="4">A bit heavy at first, but once it clicks it’s fantastic.</textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="button">Save</button>
        <a class="btn btn-outline-secondary" href="#">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
