{% extends "base.html" %}
{% block title %}Login · Boardgame World{% endblock %}

{% block content %}
<div class="panel">
  <div class="d-flex align-items-end justify-content-between gap-2 mb-3">
    <div>
      <h1 class="h4 mb-1">Login</h1>
      <div class="muted">Sign in to access your profile and private actions.</div>
    </div>
    <a class="btn btn-sm btn-outline-secondary" href="{% url 'home' %}">Back</a>
  </div>

  <form method="post">
    {% csrf_token %}
    {% include "partials/_form_fields.html" %}

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Login</button>
      <a class="btn btn-outline-secondary" href="{% url 'accounts:register' %}">Register</a>
    </div>
  </form>
</div>
{% endblock %}
