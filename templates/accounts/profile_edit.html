{% extends "base.html" %}
{% block title %}Edit profile · Boardgame World{% endblock %}

{% block content %}
<div class="panel">
  <div class="d-flex align-items-end justify-content-between gap-2 mb-3">
    <div>
      <h1 class="h4 mb-1">Edit profile</h1>
      <div class="muted">Update your personal information.</div>
    </div>
    <a class="btn btn-sm btn-outline-secondary" href="{% url 'accounts:profile' %}">Back</a>
  </div>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% include "partials/_form_fields.html" %}

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Save changes</button>
      <a class="btn btn-outline-secondary" href="{% url 'accounts:profile' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
